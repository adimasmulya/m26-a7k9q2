<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102039">
  <title>Melbourne & Victoria · Travel Cards V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@500;600;700;800&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Mood variables — overridden per trip-leg by setMood() in JS.
         Defaults to the coast (Great Ocean Road) palette. */
      --bg: #e6ddc8;
      --bg2: #d8cdb0;
      --card: #fdfbf6;
      --accent: #5a8048;
      --accent2: #6b8e5a;
      --dot: #b07a3a;
      --header-ink: #2c3a30;

      --muted: #82927e;
      --text: #26352b;
      --soft: #f1ede3;
      --line: #e0dccf;
      --danger: #b42318;
      --food: #b45309;
      --hotel: #7c3aed;
      --transit: #0369a1;
      --rest: #475467;
      --shadow: 0 12px 36px rgba(40,30,10,.16);
      --radius: 24px;
      --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --font-serif: "Fraunces", Georgia, "Times New Roman", serif;
      --font-body-serif: "Spectral", Georgia, serif;
      font-family: var(--font-sans);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--header-ink);
      background: linear-gradient(165deg, var(--bg), var(--bg2));
      background-attachment: fixed;
      overflow-x: hidden;
      transition: background .5s ease;
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    a { color: inherit; }

    .app {
      min-height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px calc(112px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hamburger, .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(40,40,30,.14);
      background: rgba(255,255,255,.55);
      color: var(--header-ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-size: 21px;
    }

    .titleblock {
      min-width: 0;
      flex: 1;
    }

    .trip-title {
      font-family: var(--font-serif);
      font-weight: 600;
      letter-spacing: -0.01em;
      font-size: 22px;
      line-height: 1.12;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--header-ink);
    }

    .trip-subtitle {
      color: rgba(44,58,48,.62);
      font-size: 12.5px;
      margin-top: 3px;
    }

    .status-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
      margin-bottom: 12px;
    }

    .status-strip::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid rgba(40,40,30,.14);
      background: rgba(255,255,255,.45);
      color: rgba(44,58,48,.78);
      font-size: 12px;
      line-height: 1;
    }

    .chip.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      border-color: transparent;
    }

    .card-shell {
      perspective: 1200px;
    }

    .card {
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.5);
      min-height: 445px;
      display: flex;
      flex-direction: column;
      position: relative;
      touch-action: pan-y;
    }

    .card::before {
      content: "";
      height: 7px;
      background: var(--accent);
      display: block;
    }

    .card.warn::before { background: linear-gradient(90deg, #b42318, #f97066); height: 9px; }

    .card-body {
      padding: 22px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .daystrip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .daystrip-leg {
      font-size: 10.5px;
      letter-spacing: .07em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--muted);
      padding: 2px 0;
      position: relative;
      padding-left: 13px;
    }
    .daystrip-leg::before {
      content: "";
      position: absolute; left: 0; top: 50%;
      width: 7px; height: 7px; border-radius: 50%;
      transform: translateY(-50%);
      background: var(--dot);
    }
    .daystrip-leg.transit::before { background: var(--transit); }
    .daystrip-leg.food::before { background: var(--food); }
    .daystrip-leg.hotel::before { background: var(--hotel); }
    .daystrip-leg.rest::before { background: var(--rest); }

    .daystrip-day {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
    }

    .live-tag {
      margin-left: auto;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: .06em;
      color: var(--accent);
    }

    /* Hero time row */
    .time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .time-digits {
      font-size: clamp(30px, 7.4vw, 42px);
      font-weight: 820;
      letter-spacing: -0.045em;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    /* On the live card the clock shares the row, so digits run a touch smaller. */
    .time-row.live .time-digits { font-size: clamp(27px, 6.6vw, 38px); }
    .time-dash { opacity: .45; margin: 0 2px; font-weight: 500; }
    .time-remaining {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }
    .dial-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: none;
    }
    .dial { display: block; }
    .dial-num {
      font-size: 9px;
      font-weight: 700;
      fill: #98a2b3;
      font-family: inherit;
    }
    .dial-now {
      font-size: 9.5px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 700;
    }

    .warn-flag {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 4px 9px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: clamp(24px, 5.8vw, 32px);
      line-height: 1.06;
      letter-spacing: -0.01em;
      margin: 0 0 6px;
      font-weight: 600;
      color: var(--text);
    }

    .card-sub {
      font-family: var(--font-body-serif);
      font-size: 15.5px;
      font-weight: 500;
      color: #52624e;
      line-height: 1.42;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .route-line {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .summary {
      font-family: var(--font-body-serif);
      color: #52624e;
      white-space: pre-line;
      line-height: 1.5;
      font-size: 15px;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 16px;
    }

    .option-actions {
      display: grid;
      gap: 8px;
      width: 100%;
      margin-bottom: 4px;
    }

    .option-actions .btn {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
    }

    .option-note {
      color: #667085;
      font-size: 12.5px;
      line-height: 1.35;
      margin: -2px 0 8px;
    }


    .btn {
      appearance: none;
      border: 0;
      border-radius: 15px;
      padding: 13px 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      font-size: 14px;
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 22px rgba(40,60,30,.22);
    }

    .btn.secondary {
      background: rgba(0,0,0,.05);
      color: #52624e;
    }

    .btn.ghost {
      background: rgba(255,255,255,.5);
      border: 1px solid rgba(40,40,30,.14);
      color: var(--header-ink);
    }

    .details {
      border-top: 1px solid var(--line);
      margin-top: 16px;
      padding-top: 15px;
      display: none;
    }

    .expanded .details { display: block; }

    .detail-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px;
    }

    a.info-box.info-link {
      display: block;
      text-decoration: none;
      cursor: pointer;
      border-color: #c7d2e0;
      transition: background .12s ease, border-color .12s ease;
    }
    a.info-box.info-link:hover { background: #eef2f7; border-color: #94a3b8; }
    a.info-box.info-link:active { background: #e2e8f0; }

    .info-box b {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #667085;
      margin-bottom: 5px;
    }

    .info-box span {
      color: #263244;
      line-height: 1.42;
      white-space: pre-line;
      font-size: 14px;
    }

    .hint {
      color: #667085;
      font-size: 12.5px;
      margin-top: 12px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 13px;
    }

    .nav-row .btn {
      flex: 1;
    }

    .anchors {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, rgba(245,240,228,.82) 25%, rgba(245,240,228,.96));
      backdrop-filter: blur(12px);
    }

    .anchor-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    .anchor {
      border: 1px solid rgba(40,40,30,.14);
      background: rgba(255,255,255,.78);
      color: var(--text);
      border-radius: 18px;
      padding: 10px 12px;
      text-align: left;
      min-height: 66px;
      cursor: pointer;
      overflow: hidden;
    }

    .anchor.anchor-empty {
      background: rgba(255,255,255,.4);
      border-style: dashed;
      border-color: rgba(40,40,30,.2);
    }
    .anchor.anchor-empty span { font-weight: 600; color: var(--muted); }

    .anchor b {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .anchor span {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      font-size: 13.5px;
      line-height: 1.2;
      font-weight: 750;
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
    }

    .drawer.open { display: block; }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.52);
    }

    .drawer-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: min(88vw, 380px);
      background: #fff;
      color: var(--text);
      padding: max(20px, env(safe-area-inset-top)) 18px 24px;
      box-shadow: 18px 0 50px rgba(0,0,0,.30);
      overflow-y: auto;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .drawer-title {
      font-family: var(--font-serif);
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .leg-title {
      margin: 18px 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #667085;
      font-weight: 850;
    }

    .day-item {
      width: 100%;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 8px;
      text-align: left;
      cursor: pointer;
    }

    .day-item.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, #fff);
    }

    .day-item b {
      display: block;
      color: #101828;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .day-item span {
      color: #667085;
      font-size: 13px;
    }

    .branch-screen {
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      border: 1px solid rgba(255,255,255,.5);
      min-height: 445px;
    }

    .branch-title {
      font-family: var(--font-serif);
      font-size: 28px;
      line-height: 1.06;
      font-weight: 600;
      letter-spacing: -.01em;
      margin-bottom: 8px;
    }

    .branch-sub {
      color: #667085;
      margin-bottom: 18px;
      line-height: 1.35;
    }

    .branch-grid {
      display: grid;
      gap: 12px;
    }

    .branch-card {
      width: 100%;
      border: 1px solid #d0d5dd;
      background: #f8fafc;
      border-radius: 18px;
      padding: 15px;
      text-align: left;
      cursor: pointer;
    }

    .branch-card b {
      display: block;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .branch-card span {
      color: #475467;
      line-height: 1.35;
      white-space: pre-line;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
    }

    .modal.open { display: block; }

    .modal-panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      color: var(--text);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      max-height: 78vh;
      overflow-y: auto;
    }

    .modal-title {
      font-weight: 860;
      letter-spacing: -.03em;
      font-size: 22px;
      line-height: 1.08;
      margin-bottom: 6px;
    }

    .modal-meta {
      color: #667085;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .empty {
      background: rgba(255,255,255,.95);
      color: var(--text);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      line-height: 1.45;
    }

    .error {
      color: #b42318;
      font-weight: 700;
    }

    @media (min-width: 680px) {
      .app { padding-left: 24px; padding-right: 24px; }
      .branch-grid { grid-template-columns: 1fr 1fr; }
      .card { min-height: 520px; }
      .card-body { padding: 30px; }
      .summary { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="hamburger" id="menuBtn" aria-label="Open day menu">☰</button>
      <div class="titleblock">
        <div class="trip-title" id="tripTitle">Melbourne & Victoria</div>
        <div class="trip-subtitle" id="tripSubtitle">Loading itinerary…</div>
      </div>
      <button class="icon-btn" id="todayBtn" title="Jump to now" aria-label="Jump to current card">⌖</button>
    </div>

    <div class="status-strip" id="statusStrip"></div>

    <main id="main"></main>

    <div class="nav-row">
      <button class="btn ghost" id="prevBtn">← Previous</button>
      <button class="btn ghost" id="nextBtn">Next →</button>
    </div>
  </div>

  <div class="anchors" id="anchors"></div>

  <div class="drawer" id="drawer">
    <div class="scrim" id="drawerScrim"></div>
    <aside class="drawer-panel">
      <div class="drawer-head">
        <div>
          <div class="drawer-title">Trip days</div>
          <div class="hint" id="drawerHint">Tap a day to jump.</div>
        </div>
        <button class="btn secondary" id="closeDrawer">Close</button>
      </div>
      <div id="dayList"></div>
      <div class="detail-grid">
        <button class="btn secondary" id="resetBranch">Reset Day 1 branch</button>
      </div>
    </aside>
  </div>

  <div class="modal" id="modal">
    <div class="scrim" id="modalScrim"></div>
    <div class="modal-panel" id="modalPanel"></div>
  </div>

  <script>
    const state = {
      data: null,
      currentId: null,
      expanded: false,
      branch: localStorage.getItem('melTripDay1Branch') || null,
      modal: null
    };

    const $ = (id) => document.getElementById(id);

    // --- Time source -------------------------------------------------------
    // Single source of truth for "what time is it now". By default this is the
    // real clock. For testing before the trip, append ?now=2026-06-22T16:32 to
    // the URL and the whole app behaves as if that were the current moment.
    // Absent the parameter, behaviour is identical to using the real clock.
    function getNowOverride() {
      try {
        const p = new URLSearchParams(window.location.search).get('now');
        if (!p) return null;
        // Interpret the supplied time as Melbourne local (the trip's timezone).
        const offset = '+10:00';
        const iso = /\d{2}:\d{2}:\d{2}/.test(p) ? p : (p.length === 16 ? p + ':00' : p);
        const d = new Date(`${iso}${offset}`);
        return isNaN(d.getTime()) ? null : d;
      } catch (e) { return null; }
    }

    function getNow() {
      return getNowOverride() || new Date();
    }

    // Minutes-since-midnight in MELBOURNE local time, regardless of the device's
    // own timezone. The whole app hardcodes Melbourne time; the dial must too,
    // or the "now" hand would be wrong when viewed from another timezone.
    function nowMinutesMelbourne() {
      const now = getNow();
      // Use Intl to read the wall-clock time in Melbourne from a real instant.
      try {
        const parts = new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Australia/Melbourne', hour: '2-digit', minute: '2-digit', hour12: false
        }).formatToParts(now);
        const h = Number(parts.find(p => p.type === 'hour').value);
        const m = Number(parts.find(p => p.type === 'minute').value);
        return ((h % 24) * 60 + m);
      } catch (e) {
        // Fallback: derive from the fixed +10:00 offset.
        const utc = now.getTime() + now.getTimezoneOffset() * 60000;
        const mel = new Date(utc + 10 * 3600000);
        return mel.getHours() * 60 + mel.getMinutes();
      }
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[ch]));
    }

    function minutes(time) {
      const [h, m] = String(time || '00:00').split(':').map(Number);
      return h * 60 + m;
    }

    function localDate(card, which = 'start') {
      const offset = state.data?.trip?.utcOffset || '+10:00';
      return new Date(`${card.date}T${card[which] || card.start}:00${offset}`);
    }

    function typeLabel(type) {
      return ({ transit: 'Move', food: 'Food', hotel: 'Hotel', rest: 'Rest', activity: 'Activity' })[type] || 'Plan';
    }

    function visibleCards() {
      if (!state.data) return [];
      return state.data.cards.filter(c => {
        if (c.dayNumber === 1 && c.branch && state.branch) return c.branch === state.branch;
        return true;
      });
    }

    function currentIndex() {
      const cards = visibleCards();
      if (!cards.length) return -1;
      const idx = cards.findIndex(c => c.id === state.currentId);
      return idx >= 0 ? idx : 0;
    }

    function currentCard() {
      const cards = visibleCards();
      return cards[currentIndex()] || null;
    }

    function findNowCardId() {
      const cards = visibleCards();
      if (!cards.length) return null;
      const now = getNow();
      const active = cards.find(c => now >= localDate(c, 'start') && now < localDate(c, 'end'));
      if (active) return active.id;
      const upcoming = cards.find(c => now < localDate(c, 'start'));
      return (upcoming || cards[cards.length - 1]).id;
    }

    function setCurrent(id) {
      state.currentId = id;
      state.expanded = false;
      render();
    }

    function move(delta) {
      const cards = visibleCards();
      const idx = currentIndex();
      const nextIdx = Math.min(Math.max(idx + delta, 0), cards.length - 1);
      if (cards[nextIdx]) setCurrent(cards[nextIdx].id);
    }

    function jumpToDay(dayNumber) {
      const cards = visibleCards();
      const first = cards.find(c => c.dayNumber === dayNumber);
      if (first) setCurrent(first.id);
      closeDrawer();
    }

    function selectBranch(branch, startTime) {
      state.branch = branch;
      localStorage.setItem('melTripDay1Branch', branch);
      const candidates = visibleCards().filter(c => c.dayNumber === 1 && (!startTime || c.start === startTime));
      const chosen = candidates.find(c => c.branch === branch) || candidates[0] || visibleCards()[0];
      state.currentId = chosen.id;
      state.expanded = false;
      render();
    }

    function hotelForCard(card) {
      const day = state.data.days.find(d => d.dayNumber === card.dayNumber);
      if (!day || !day.hotelId) return null;
      return state.data.hotels.find(h => h.id === day.hotelId) || null;
    }

    function isRealFoodStop(c) {
      // A food card only counts as a genuine shortlisted stop if it names a real
      // venue. TBC / placeholder cards (no fixed restaurant) should fall through
      // to the "food near me" search instead of posing as a definite plan.
      if (!c) return false;
      const text = ((c.title || '') + ' ' + (c.detail || '')).trim();
      // "TBC" anywhere in title or detail = not a fixed venue
      if (/\bTBC\b/i.test(text)) return false;
      const opts = Array.isArray(c.options) ? c.options : [];
      // a card whose ONLY option is a generic "... search" placeholder is not fixed
      if (opts.length === 1 && /search$/i.test((opts[0].label || '').trim())) return false;
      return true;
    }

    function nextFoodForCard(card) {
      // Only look forward within the SAME day, and only at REAL (non-TBC) food
      // stops. If none remain today, return null so the anchor falls back to a
      // "food near me" search.
      const cards = visibleCards();
      const start = minutes(card.start);
      return cards.find(c => c.date === card.date && c.type === 'food'
                            && minutes(c.start) >= start && isRealFoodStop(c)) || null;
    }

    function mapsButton(url, label = 'Open Maps') {
      if (!url) return '';
      return `<a class="btn primary" href="${escapeHtml(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 ${escapeHtml(label)}</a>`;
    }

    function mapActions(card) {
      const opts = Array.isArray(card.options) ? card.options.filter(o => o && o.mapsUrl) : [];
      if (opts.length) {
        return `
          <div class="option-actions">
            <div class="option-note">This slot has multiple possible stops. Pick the one you are actually doing.</div>
            ${opts.map(o => `<a class="btn primary" href="${escapeHtml(o.mapsUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 ${escapeHtml(o.label || o.title || 'Open Maps')}</a>`).join('')}
          </div>
        `;
      }
      return mapsButton(card.mapsUrl);
    }

    function optionDetails(card) {
      const opts = Array.isArray(card.options) ? card.options : [];
      if (!opts.length) return '';
      return `<div class="detail-grid">
        ${opts.map(o => {
          const inner = `<b>${escapeHtml(o.label || 'Option')}</b><span>${escapeHtml(o.title || '')}${o.detail ? '\n' + escapeHtml(o.detail) : ''}${o.mapsUrl ? '\n📍 Tap to open in Maps' : ''}</span>`;
          return o.mapsUrl
            ? `<a class="info-box info-link" href="${escapeHtml(o.mapsUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${inner}</a>`
            : `<div class="info-box">${inner}</div>`;
        }).join('')}
      </div>`;
    }

    function activityDetails(card) {
      const a = card.activityDetail;
      if (!a) return '';
      const rows = [
        ['Opening', a.openingHours],
        ['Cost', a.entryCost],
        ['Booking', a.bookingRequired],
        ['Time needed', a.timeNeeded],
        ['Toddler', a.toddlerScore ? `${a.toddlerScore}/5` : ''],
        ['Tip', a.practicalTip]
      ].filter(([_, value]) => value);
      return `<div class="detail-grid">${rows.map(([k, v]) =>
        `<div class="info-box"><b>${escapeHtml(k)}</b><span>${escapeHtml(v)}</span></div>`
      ).join('')}</div>`;
    }

    // --- Card presentation helpers ----------------------------------------
    // Split a title into a short bold headline + a quieter sub-line.
    // Uses the " · " separator the data already employs. A leading ⚠ is pulled
    // out as a warning flag so the card can mark it without shouting in the title.
    function splitTitle(rawTitle) {
      let t = String(rawTitle || '').trim();
      let warn = false;
      if (t.startsWith('⚠')) { warn = true; t = t.replace(/^⚠\s*/, ''); }
      const parts = t.split('·').map(s => s.trim()).filter(Boolean);
      const headline = parts.length ? parts[0] : t;
      const sub = parts.length > 1 ? parts.slice(1).join(' · ') : '';
      return { headline, sub, warn };
    }

    // Is the given card the one happening at the current (real or overridden) moment?
    function isLiveCard(card) {
      if (!card) return false;
      const now = getNow();
      return now >= localDate(card, 'start') && now < localDate(card, 'end');
    }

    // Build the "time remaining" line for the live card.
    function remainingText(card) {
      const now = getNow();
      const end = localDate(card, 'end');
      const mins = Math.max(0, Math.round((end - now) / 60000));
      if (mins <= 0) return 'wrapping up';
      if (mins < 60) return `${mins} min left`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m ? `${h} hr ${m} min left` : `${h} hr left`;
    }

    // Classic 12-hour clock face: twelve hour numbers, the card's slot drawn as
    // a coloured arc on the rim, and "now" shown as a hand from the centre.
    // Melbourne time is used for the hand (timezone-independent). Live card only.
    function dialSvg(card) {
      const C = 60, R = 50, STROKE = 6;          // 120x120 box (~2x previous)
      const toAngle = (mins) => ((mins % 720) / 720) * 360 - 90; // 12h, 0 at top
      const polar = (mins, r) => {
        const a = toAngle(mins) * Math.PI / 180;
        return [C + r * Math.cos(a), C + r * Math.sin(a)];
      };
      const s = minutes(card.start), e = minutes(card.end);
      const [sx, sy] = polar(s, R), [ex, ey] = polar(e, R);
      const large = ((e - s) % 720) > 360 ? 1 : 0;
      const arc = `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;

      // hour numbers 1..12
      let numbers = '';
      for (let n = 1; n <= 12; n++) {
        const ang = (n / 12) * 360 - 90;
        const rad = ang * Math.PI / 180;
        const nx = C + (R - 13) * Math.cos(rad);
        const ny = C + (R - 13) * Math.sin(rad);
        numbers += `<text x="${nx.toFixed(1)}" y="${(ny + 4).toFixed(1)}" text-anchor="middle" class="dial-num">${n}</text>`;
      }

      // now hand (Melbourne)
      const nowM = nowMinutesMelbourne();
      const [hx, hy] = polar(nowM, R - 16);

      const col = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#5a8048';
      return `
        <svg class="dial" viewBox="0 0 120 120" width="104" height="104" aria-hidden="true">
          <circle cx="${C}" cy="${C}" r="${R}" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
          <path d="${arc}" fill="none" stroke="${col}" stroke-width="${STROKE}" stroke-linecap="round" opacity="0.92"/>
          ${numbers}
          <line x1="${C}" y1="${C}" x2="${hx.toFixed(2)}" y2="${hy.toFixed(2)}" stroke="#101828" stroke-width="3" stroke-linecap="round"/>
          <circle cx="${C}" cy="${C}" r="3.5" fill="#101828"/>
        </svg>`;
    }

    function renderNormalCard(card) {
      const expanded = state.expanded ? ' expanded' : '';
      const { headline, sub, warn } = splitTitle(card.title);
      const live = isLiveCard(card);
      const details = [
        card.detail ? `<div class="summary">${escapeHtml(card.detail)}</div>` : '',
        optionDetails(card),
        activityDetails(card),
        `<div class="hint">Tap card to ${state.expanded ? 'collapse' : 'expand'} details. Swipe left/right for next or previous.</div>`
      ].join('');

      const timeBlock = `
        <div class="time-row${live ? ' live' : ''}">
          <div class="time-main">
            <div class="time-digits">${escapeHtml(card.start)}<span class="time-dash">–</span>${escapeHtml(card.end)}</div>
            ${live ? `<div class="time-remaining">${escapeHtml(remainingText(card))}</div>` : ''}
          </div>
          ${live ? `<div class="dial-wrap">${dialSvg(card)}<span class="dial-now">now</span></div>` : ''}
        </div>`;

      $('main').innerHTML = `
        <section class="card-shell">
          <article class="card ${escapeHtml(card.type)}${expanded}${warn ? ' warn' : ''}" id="activeCard">
            <div class="card-body" id="cardBody">
              <div class="daystrip">
                <span class="daystrip-leg ${escapeHtml(card.type)}">${escapeHtml(typeLabel(card.type))}</span>
                <span class="daystrip-day">${escapeHtml(card.dayLabel)} · ${escapeHtml(card.dateLabel)}</span>
                ${card.branch ? `<span class="daystrip-day">${escapeHtml(card.branch.toUpperCase())}</span>` : ''}
                ${live ? `<span class="live-tag">● NOW</span>` : ''}
              </div>
              ${timeBlock}
              ${warn ? `<div class="warn-flag">⚠ Time-critical</div>` : ''}
              <h1 class="card-title">${escapeHtml(headline)}</h1>
              ${sub ? `<div class="card-sub">${escapeHtml(sub)}</div>` : ''}
              <div class="route-line">${escapeHtml(card.routeTitle)}</div>
              ${card.detail ? `<div class="summary">${escapeHtml(card.detail)}</div>` : ''}
              <div class="actions">
                ${mapActions(card)}
                <button class="btn secondary" id="expandBtn">${state.expanded ? 'Collapse details' : 'More details'}</button>
              </div>
              <div class="details">${details}</div>
            </div>
          </article>
        </section>
      `;

      $('cardBody').addEventListener('click', () => {
        state.expanded = !state.expanded;
        render();
      });
      const expandBtn = $('expandBtn');
      if (expandBtn) expandBtn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        state.expanded = !state.expanded;
        render();
      });
      attachSwipe($('activeCard'));
    }

    function renderBranchChooser(card) {
      const options = state.data.cards
        .filter(c => c.dayNumber === 1 && c.start === card.start && c.branch)
        .sort((a, b) => a.branch.localeCompare(b.branch));

      $('main').innerHTML = `
        <section class="branch-screen" id="branchScreen">
          <div class="branch-title">Which Day 1 scenario is happening?</div>
          <div class="branch-sub">Choose once and the itinerary will hide the unused branch. You can reset this from the menu.</div>
          <div class="branch-grid">
            ${options.map(c => `
              <button class="branch-card" data-branch="${escapeHtml(c.branch)}">
                <b>${escapeHtml(c.branch === 'awake' ? 'Alyssa awake' : 'Alyssa asleep')} · ${escapeHtml(c.start)}</b>
                <span>${escapeHtml(c.title)}${c.detail ? '\n' + escapeHtml(c.detail) : ''}</span>
              </button>
            `).join('')}
          </div>
          <div class="hint">This only affects the branched Day 1 cards.</div>
        </section>
      `;
      document.querySelectorAll('.branch-card').forEach(btn => {
        btn.addEventListener('click', () => selectBranch(btn.dataset.branch, card.start));
      });
    }

    function renderStatus(card) {
      const day = state.data.days.find(d => d.dayNumber === card.dayNumber);
      const idx = currentIndex() + 1;
      const total = visibleCards().length;
      $('statusStrip').innerHTML = `
        <span class="chip active">${escapeHtml(card.leg)}</span>
        <span class="chip">${escapeHtml(day?.routeTitle || card.routeTitle)}</span>
        <span class="chip">Card ${idx}/${total}</span>
        ${state.branch ? `<span class="chip">Day 1: ${escapeHtml(state.branch)}</span>` : ''}
      `;
    }

    function renderAnchors(card) {
      const food = nextFoodForCard(card);
      const hotel = hotelForCard(card);
      $('anchors').innerHTML = `
        <div class="anchor-inner">
          <button class="anchor${food ? '' : ' anchor-empty'}" id="foodAnchor">
            <b>${food ? 'Next food' : 'Food · none planned'}</b>
            <span>${food ? `${food.start} · ${escapeHtml(food.title)}` : 'Tap to search nearby'}</span>
          </button>
          <button class="anchor" id="hotelAnchor">
            <b>Tonight</b>
            <span>${hotel ? escapeHtml(hotel.property) : 'No hotel anchor'}</span>
          </button>
        </div>
      `;
      $('foodAnchor').addEventListener('click', () => food ? openCardModal(food) : openFoodSearchModal());
      $('hotelAnchor').addEventListener('click', () => hotel ? openHotelModal(hotel) : null);
    }

    function renderDayMenu(card) {
      const grouped = [];
      let lastLeg = null;
      state.data.days.forEach(day => {
        if (day.leg !== lastLeg) {
          grouped.push({ leg: day.leg, days: [] });
          lastLeg = day.leg;
        }
        grouped[grouped.length - 1].days.push(day);
      });

      $('dayList').innerHTML = grouped.map(group => `
        <div class="leg-title">${escapeHtml(group.leg)}</div>
        ${group.days.map(day => `
          <button class="day-item ${day.dayNumber === card.dayNumber ? 'active' : ''}" data-day="${day.dayNumber}">
            <b>${escapeHtml(day.dayLabel)} · ${escapeHtml(day.dateLabel)}</b>
            <span>${escapeHtml(day.routeTitle)}</span>
          </button>
        `).join('')}
      `).join('');

      document.querySelectorAll('.day-item').forEach(btn => {
        btn.addEventListener('click', () => jumpToDay(Number(btn.dataset.day)));
      });
    }

    // Per-leg colour moods. Keyed by trip leg, resolved from day number so the
    // app's background, accent and dot shift as the journey moves coast → forest
    // → island → city → departure. Purely presentational.
    const MOODS = {
      coast:     { bg:'#e6ddc8', bg2:'#d8cdb0', card:'#fdfbf6', accent:'#5a8048', accent2:'#6b8e5a', dot:'#b07a3a', ink:'#2c3a30', theme:'#5a8048' },
      forest:    { bg:'#d9e0cf', bg2:'#c3cfb0', card:'#fbfcf7', accent:'#4a7a3e', accent2:'#6b9b5a', dot:'#a06a2a', ink:'#2a3a28', theme:'#4a7a3e' },
      island:    { bg:'#d6e2dd', bg2:'#bcd0c8', card:'#f9fcfa', accent:'#2f7d6e', accent2:'#4ba596', dot:'#c2691a', ink:'#23352f', theme:'#2f7d6e' },
      city:      { bg:'#e4ddd6', bg2:'#cfc6bc', card:'#fdfbf8', accent:'#7a5a8e', accent2:'#9a7aae', dot:'#b07a3a', ink:'#322a38', theme:'#7a5a8e' },
      departure: { bg:'#dde2e6', bg2:'#c6cdd4', card:'#fbfcfd', accent:'#5a7a8e', accent2:'#7a9aae', dot:'#8a7a6a', ink:'#2a343a', theme:'#5a7a8e' },
    };

    function moodForDay(dayNumber) {
      if (dayNumber <= 4) return 'coast';      // Great Ocean Road
      if (dayNumber <= 7) return 'forest';     // Marysville / Yarra Valley
      if (dayNumber <= 10) return 'island';    // Phillip Island
      if (dayNumber <= 13) return 'city';      // Melbourne
      return 'departure';                      // Day 14
    }

    function setMood(card) {
      const m = MOODS[moodForDay(card.dayNumber)] || MOODS.coast;
      const r = document.documentElement.style;
      r.setProperty('--bg', m.bg);
      r.setProperty('--bg2', m.bg2);
      r.setProperty('--card', m.card);
      r.setProperty('--accent', m.accent);
      r.setProperty('--accent2', m.accent2);
      r.setProperty('--dot', m.dot);
      r.setProperty('--header-ink', m.ink);
      const tc = document.querySelector('meta[name="theme-color"]');
      if (tc) tc.setAttribute('content', m.theme);
    }

    function render() {
      if (!state.data) return;
      const card = currentCard();
      if (!card) {
        $('main').innerHTML = '<div class="empty">No itinerary card found.</div>';
        return;
      }
      setMood(card);
      $('tripTitle').textContent = state.data.trip.title;
      $('tripSubtitle').textContent = state.data.trip.subtitle;
      renderStatus(card);
      renderDayMenu(card);
      if (card.dayNumber === 1 && card.branch && !state.branch) {
        renderBranchChooser(card);
      } else {
        renderNormalCard(card);
      }
      renderAnchors(card);
    }

    function openDrawer() { $('drawer').classList.add('open'); }
    function closeDrawer() { $('drawer').classList.remove('open'); }

    function openModal(html) {
      $('modalPanel').innerHTML = html;
      $('modal').classList.add('open');
    }

    function closeModal() {
      $('modal').classList.remove('open');
      $('modalPanel').innerHTML = '';
    }

    function openCardModal(card) {
      openModal(`
        <div class="modal-title">${escapeHtml(card.title)}</div>
        <div class="modal-meta">${escapeHtml(card.dayLabel)} · ${escapeHtml(card.dateLabel)} · ${escapeHtml(card.start)}–${escapeHtml(card.end)}</div>
        ${card.detail ? `<div class="summary">${escapeHtml(card.detail)}</div>` : ''}
        ${optionDetails(card)}
        ${activityDetails(card)}
        <div class="actions">${mapActions(card)}<button class="btn secondary" id="modalCloseBtn">Close</button></div>
      `);
      $('modalCloseBtn').addEventListener('click', closeModal);
    }

    function openFoodSearchModal() {
      const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('food near me');
      openModal(`
        <div class="modal-title">No food stop planned</div>
        <div class="modal-meta">Nothing shortlisted for this part of the day</div>
        <div class="summary">There is no planned food stop left today. You can open Maps to find something open near where you are right now.</div>
        <div class="actions">
          <a class="btn primary" href="${url}" target="_blank" rel="noopener">📍 Search food near me</a>
          <button class="btn secondary" id="modalCloseBtn">Close</button>
        </div>
      `);
      $('modalCloseBtn').addEventListener('click', closeModal);
    }

    function openHotelModal(hotel) {
      const rows = [
        ['Address', hotel.address],
        ['Check in', hotel.checkIn],
        ['Check out', hotel.checkOut],
        ['Booking ref', hotel.bookingRef],
        ['Total cost', hotel.totalCost],
        ['Cancel by', hotel.cancelBy],
        ['Payment', hotel.payment],
        ['Notes', hotel.notes]
      ].filter(([_, v]) => v);

      openModal(`
        <div class="modal-title">${escapeHtml(hotel.property)}</div>
        <div class="modal-meta">Tonight's accommodation</div>
        <div class="detail-grid">
          ${rows.map(([k, v]) => `<div class="info-box"><b>${escapeHtml(k)}</b><span>${escapeHtml(v)}</span></div>`).join('')}
        </div>
        <div class="actions">${mapsButton(hotel.mapsUrl)}<button class="btn secondary" id="modalCloseBtn">Close</button></div>
      `);
      $('modalCloseBtn').addEventListener('click', closeModal);
    }

    function attachSwipe(el) {
      let startX = 0;
      let startY = 0;
      el.addEventListener('touchstart', ev => {
        startX = ev.changedTouches[0].clientX;
        startY = ev.changedTouches[0].clientY;
      }, { passive: true });

      el.addEventListener('touchend', ev => {
        const dx = ev.changedTouches[0].clientX - startX;
        const dy = ev.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.3) {
          move(dx < 0 ? 1 : -1);
        }
      }, { passive: true });
    }

    async function init() {
      try {
        const res = await fetch(`itinerary.json?ts=${Date.now()}`);
        if (!res.ok) throw new Error(`Could not load itinerary.json (${res.status})`);
        state.data = await res.json();
        state.currentId = findNowCardId();
        render();
      } catch (err) {
        $('tripSubtitle').textContent = 'Could not load itinerary data';
        $('main').innerHTML = `
          <div class="empty">
            <p class="error">The itinerary data file could not be loaded.</p>
            <p>Make sure <b>index.html</b> and <b>itinerary.json</b> are in the same GitHub Pages folder. Opening this file directly from your computer may block the browser from reading JSON.</p>
            <p>${escapeHtml(err.message)}</p>
          </div>
        `;
        $('anchors').innerHTML = '';
      }
    }

    $('menuBtn').addEventListener('click', openDrawer);
    $('closeDrawer').addEventListener('click', closeDrawer);
    $('drawerScrim').addEventListener('click', closeDrawer);
    $('prevBtn').addEventListener('click', () => move(-1));
    $('nextBtn').addEventListener('click', () => move(1));
    $('todayBtn').addEventListener('click', () => { state.currentId = findNowCardId(); state.expanded = false; render(); });
    $('resetBranch').addEventListener('click', () => {
      localStorage.removeItem('melTripDay1Branch');
      state.branch = null;
      render();
    });
    $('modalScrim').addEventListener('click', closeModal);

    document.addEventListener('keydown', ev => {
      if (ev.key === 'ArrowLeft') move(-1);
      if (ev.key === 'ArrowRight') move(1);
      if (ev.key === 'Escape') { closeDrawer(); closeModal(); }
    });

    init();
  </script>
</body>
</html>
